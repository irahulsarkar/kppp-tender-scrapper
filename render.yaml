services:
  - type: web
    name: kppp-tender-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --omit=dev
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kppp-tender-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: SCRAPE_ON_START
        value: "true"
      - key: SCRAPE_INTERVAL_MINUTES
        value: "30"

databases:
  - name: kppp-tender-db
    databaseName: kppp_tenders
    user: kppp_user
